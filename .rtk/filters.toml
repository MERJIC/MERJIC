# Project-local RTK filters — commit this file with your repo.
# Docs: https://github.com/rtk-ai/rtk#custom-filters
schema_version = 1

# ── 概念库 lint 压缩 ──────────────────────────────────
[filters.concept-lint]
description = "压缩 lint_concepts.py 输出：去空行，全量模式截断到 40 行，超出的存 tee"
match_command = "^python3 scripts/lint_concepts\\.py"
strip_lines_matching = [
  "^$",
  "^---$",
  "^提示：",
]
max_lines = 40
on_empty = "lint: 全部通过"

# ── 概念库索引刷新 ──────────────────────────────────
[filters.concept-index]
description = "压缩 build_index.py 输出，只保留最后汇总行"
match_command = "^python3 scripts/build_index\\.py"
strip_lines_matching = [
  "^$",
]
